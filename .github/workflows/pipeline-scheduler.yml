name: Pipeline Scheduler

on:
  schedule:
    # Every 6 hours — backstop polling: ingest → plan → refresh-status → notify
    - cron: '0 */6 * * *'
    # Daily at 06:00 UTC — full planner refresh: ingest → plan --full-refresh → refresh-status → notify
    - cron: '0 6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [new-issue, issue-updated]

concurrency:
  group: backlog-autopilot-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    name: Run pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
      DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
      TARGET_REPO: ${{ vars.TARGET_REPO || 'sarahmoooree-builds/finserv-platform' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          # The 6am cron is the full-refresh run; every other trigger
          # (6-hour backstop, workflow_dispatch, repository_dispatch) runs
          # the incremental plan.
          if [ "${{ github.event.schedule }}" = "0 6 * * *" ]; then
            echo "full_refresh=true" >> "$GITHUB_OUTPUT"
          else
            echo "full_refresh=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ingest issues
        run: python cli.py ingest

      - name: Plan (incremental)
        if: steps.mode.outputs.full_refresh != 'true'
        run: python cli.py plan

      - name: Plan (full refresh)
        if: steps.mode.outputs.full_refresh == 'true'
        run: python cli.py plan --full-refresh

      - name: Refresh execution session statuses
        run: python cli.py refresh-status

      - name: Send approval reminders
        run: python cli.py notify
