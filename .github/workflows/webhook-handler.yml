name: Issue Webhook Handler

on:
  issues:
    types: [opened, labeled, edited]

concurrency:
  # Serialise webhook handling per issue so two rapid edits don't race.
  group: backlog-autopilot-webhook-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  handle-issue:
    name: Re-ingest and rescore issue
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
      DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
      TARGET_REPO: ${{ vars.TARGET_REPO || 'sarahmoooree-builds/finserv-platform' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Re-ingest from GitHub
        run: python cli.py ingest

      - name: Rescore changed issue
        # cli.py rescore sends a Slack notification when the issue crosses
        # RECOMMEND_THRESHOLD, satisfying the "notify above threshold" step.
        run: python cli.py rescore --issue-id ${{ github.event.issue.number }}
